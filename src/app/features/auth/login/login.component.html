<div class="login-container">
  <div class="login-card">
    <h2>TAP Terminal</h2>
    <p class="subtitle">
      {{ isRecoveryMode ? 'Recuperar acceso al sistema' : 'Inicia sesión para continuar' }}
    </p>

    @if (errorMessage) {
      <div class="alert alert-danger">{{ errorMessage }}</div>
    }
    @if (successMessage) {
      <div class="alert alert-success">{{ successMessage }}</div>
    }

    <form [formGroup Pall] [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="username">Correo Electrónico</label>
        <input 
          type="email" 
          id="username" 
          formControlName="username" 
          placeholder="ejemplo@tapterminal.com"
          autocomplete="username"
        />
      </div>

      @if (!isRecoveryMode) {
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
      }

      <div class="text-right">
        <a type="button" class="link-toggle" (click)="toggleMode()">
          {{ isRecoveryMode ? 'Volver al Login' : '¿Olvidaste tu contraseña?' }}
        </a>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid && !isRecoveryMode || isLoading">
        {{ isLoading ? 'Procesando...' : (isRecoveryMode ? 'Enviar Correo' : 'Entrar') }}
      </button>

    </form>
  </div>
</div>
